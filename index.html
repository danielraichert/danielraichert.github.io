<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Raichert-Web</title>
    <style>
        body {
            position: relative;
            overflow: hidden; /* Prevent scrolling */
            height: 100vh;
            margin: 0;
            background-color: #e0f7fa; /* Light background */
            font-family: 'Comic Sans MS', cursive, sans-serif;
        }

        #tornado {
            position: absolute;
            left: 50%; /* Center the tornado */
            top: 50%; /* Start in the middle of the screen */
            transform: translate(-50%, -50%); /* Center it perfectly */
            font-size: 64px; /* Size of the tornado */
            transition: transform 0.5s; /* Smooth movement */
        }

        .trail {
            position: absolute;
            pointer-events: none; /* Avoid interactions */
            font-size: 32px; /* Size of trail emojis */
            opacity: 1; /* Initial opacity */
            transition: opacity 0.5s; /* Smooth fade */
        }

        .quote {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            display: none; /* Hidden initially */
            z-index: 10; /* Above tornado and trail */
        }
    </style>
</head>
<body>
    <div id="tornado">🌪️</div>
    <div class="quote" id="quote">That's it, folks ¯\_(ツ)_/¯</div>

    <script>
        const tornado = document.getElementById('tornado');
        const quote = document.getElementById('quote');
        const trailLength = 10; // Number of trail emojis
        const trail = [];
        let isMoving = true;

        // Function to create trail emojis
        function createTrail() {
            for (let i = 0; i < trailLength; i++) {
                const trailEmoji = document.createElement('div');
                trailEmoji.className = 'trail';
                trailEmoji.textContent = '💨'; // Wind/fog emoji
                document.body.appendChild(trailEmoji);
                trail.push(trailEmoji);
            }
        }

        // Function to update trail positions
        function updateTrail() {
            const { left, top } = tornado.getBoundingClientRect();
            trail.forEach((emoji, index) => {
                emoji.style.left = `${left + 16}px`; // Align trail to the center of the tornado
                emoji.style.top = `${top + 16}px`; // Align trail to the center of the tornado
                emoji.style.opacity = 1 - (index / trailLength); // Fade effect
            });
        }

        // Function to move the tornado
        function moveTornado() {
            let angle = Math.random() * 2 * Math.PI; // Random angle for movement
            const speed = 3; // Speed of movement

            function animate() {
                if (!isMoving) return;

                const rect = tornado.getBoundingClientRect();
                let newX = rect.left + Math.cos(angle) * speed;
                let newY = rect.top + Math.sin(angle) * speed;

                // Check for border collision
                if (newX < 0 || newX > window.innerWidth - 64) angle = Math.PI - angle; // Bounce back
                if (newY < 0 || newY > window.innerHeight - 64) angle = -angle; // Bounce back

                tornado.style.left = `${newX}px`;
                tornado.style.top = `${newY}px`;
                updateTrail();

                requestAnimationFrame(animate);
            }
            animate();
        }

        // Click event to stop tornado and show the quote
        tornado.addEventListener('click', () => {
            isMoving = false;
            tornado.style.transition = 'transform 0.5s';
            tornado.style.transform = 'scale(1.5)'; // Enlarge tornado during transition
            setTimeout(() => {
                tornado.textContent = '🍏'; // Transform to apple
                tornado.style.transition = 'transform 0.5s';
                tornado.style.transform = 'scale(1)'; // Reset size
            }, 500); // Wait for the transition
            setTimeout(() => {
                quote.style.display = 'block'; // Show quote
                quote.style.opacity = 0; // Start invisible
                quote.style.transition = 'opacity 0.5s';
                quote.style.opacity = 1; // Fade in
            }, 1000); // Wait for the apple to appear
        });

        // Create the trail and start moving the tornado
        createTrail();
        moveTornado();
    </script>
</body>
</html>
